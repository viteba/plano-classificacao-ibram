/* BARRA SUPERIOR */

.topbar{
background:#003366;

padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
}

.titulo-topo{
font-size:18px;
font-weight:600;
}

/* CAPA */

.capa{
height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.capa h1{
color:#003366;
font-size:32px;
max-width:800px;
}

.botao{
margin-top:30px;
padding:15px 35px;
border:none;
background:#00875A;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

.botao:hover{
background:#006644;
}

/* SISTEMA */

.sistema{
display:none;
padding:30px;
}

.topo{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
flex-wrap:wrap;
gap:15px;
}

.voltar{
padding:10px 20px;
border:none;
border-radius:5px;
background:#003366;
color:white;
cursor:pointer;
}

.voltar:hover{
background:#001f40;
}

.pesquisa{
padding:10px;
width:300px;
border-radius:5px;
border:1px solid #ccc;
}

.container{
background:white;
padding:25px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

/* LISTAS */

ul{
list-style:none;
padding-left:25px;
}

li{
margin:6px 0;
cursor:pointer;
}

.seta{
display:inline-block;
width:20px;
}

.funcao{
font-weight:700;
color:#00875A;
font-size:17px;
}

.subfuncao{
color:#003366;
}

.atividade{
color:#00509E;
}

.documento{
color:#333;
cursor:default;
}

.hidden{
display:none;
}

.highlight{
background:#fff3cd;
}

</style>
</head>

/* CRIAR ÁRVORE */

function criarArvore(){

const arvore=document.getElementById("arvore");

Object.entries(plano)
.sort((a,b)=>Number(a[0])-Number(b[0]))
.forEach(([f,dF])=>{

let liF=document.createElement("li");
liF.className="funcao";

let seta=document.createElement("span");
seta.className="seta";
seta.textContent="▶";

liF.appendChild(seta);
liF.append(" "+f+" - "+dF.nome);

let ul=document.createElement("ul");
ul.classList.add("hidden");

liF.onclick=function(e){
e.stopPropagation();
ul.classList.toggle("hidden");
seta.textContent=ul.classList.contains("hidden")?"▶":"▼";
};

Object.entries(dF.subfuncoes||{}).forEach(([s,dS])=>{

let liS=document.createElement("li");
liS.className="subfuncao";
liS.textContent=f+"."+s+" - "+dS.nome;

let ulA=document.createElement("ul");
ulA.classList.add("hidden");

liS.onclick=function(e){
e.stopPropagation();
ulA.classList.toggle("hidden");
};

Object.entries(dS.atividades||{}).forEach(([a,dA])=>{

let liA=document.createElement("li");
liA.className="atividade";
liA.textContent=f+"."+s+"."+a+" - "+dA.nome;
